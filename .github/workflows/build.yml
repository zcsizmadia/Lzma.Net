name: Build & Pack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest     # Linux x64
          - os: ubuntu-24.04-arm  # Linux ARM64
          - os: windows-latest    # Windows x64
          - os: windows-11-arm    # Windows ARM64
          - os: macos-latest      # macOS x64
          - os: ubuntu-latest     # Alpine Linux x64 (musl)
            container: mcr.microsoft.com/dotnet/sdk:10.0-alpine

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }} # If evaluates to 'null' for they run on the host

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Testing in CI runs on all supported .NET versions to ensure compatibility.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

  pack:
    needs: build
    runs-on: ubuntu-latest
    name: Pack NuGet

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack LzmaNet -c Release -o nupkgs

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkgs/*.nupkg
